server:
  port: 8080

spring:
  application:
    name: simple-rate-limiter
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ── Everything about the rate limiter's behavior lives here — change the
#    algorithm or the limits without touching any code. ──────────────────────
rate-limiter:
  algorithm: TOKEN_BUCKET # or FIXED_WINDOW

  fixed-window:
    max-requests: 10
    window-seconds: 60

  token-bucket:
    capacity: 10
    refill-rate: 2 # tokens added per second

# ── Exposes /actuator/health and /actuator/prometheus for the observability
#    stack (Prometheus scrapes the second one every few seconds). ────────────
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
